version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: school_erp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: school_erp
      POSTGRES_USER: school_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-StrongPass@2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U school_admin -d school_erp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - school_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: school_erp_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-RedisPass@2024}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-RedisPass@2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - school_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: school_erp_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://school_admin:${DB_PASSWORD:-StrongPass@2024}@postgres:5432/school_erp
      REDIS_URL: redis://:${REDIS_PASSWORD:-RedisPass@2024}@redis:6379
    ports:
      - "5000:5000"
    volumes:
      - ./backend/src:/app/src
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - school_network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: school_erp_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - school_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: school_erp_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - school_network

  # pgAdmin (dev only)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: school_erp_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@school.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    profiles:
      - dev
    networks:
      - school_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  school_network:
    driver: bridge
